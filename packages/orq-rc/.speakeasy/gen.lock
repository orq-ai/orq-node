releaseNotes: "## Typescript SDK Changes:\n* `orq.agents.create()`: \n  *  `request.settings.tools[]` **Changed**\n  *  `response.settings.tools[].timeout` **Changed**\n* `orq.agents.list()`:  `response.data[].settings.tools[].timeout` **Changed**\n* `orq.agents.retrieve()`:  `response.settings.tools[].timeout` **Changed**\n* `orq.agents.update()`: \n  *  `requestBody.settings.tools[]` **Changed**\n  *  `response.settings.tools[].timeout` **Changed**\n* `orq.agents.run()`: \n  *  `request.settings.tools[]` **Changed**\n* `orq.agents.streamRun()`: \n  *  `request.settings.tools[]` **Changed**\n  *  `response.[].data` **Changed**\n* `orq.agents.stream()`:  `response.[].data` **Changed**\n* `orq.tools.list()`:  `response.data[].union(http).http.blueprint.timeout` **Added**\n* `orq.tools.create()`: \n  *  `request.union(http).http.blueprint.timeout` **Added**\n  *  `response.union(http).http.blueprint.timeout` **Added**\n* `orq.tools.update()`: \n  *  `request.requestBody.union(http).http.blueprint.timeout` **Added**\n  *  `response.union(http).http.blueprint.timeout` **Added**\n* `orq.tools.retrieve()`:  `response.union(http).http.blueprint.timeout` **Added**\n"
